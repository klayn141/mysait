<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Это мой проект</title>
    <link rel="stylesheet" href="./fonts/fonts.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "stratosSkyeng", sans-serif;
            background: linear-gradient(135deg, #0bd860 0%, #a02b4e 100%);
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
        }
        
        img {
            width: 800px;
            max-width: 100%;
            border-radius: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .content {
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 50px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.1);
        }
        
        h1 {
            font-size: 57px;
            margin-bottom: 15px;
            color: #262161;
        }
        
        h2 {
            font-size: 60px;
            margin-bottom: 20px;
            color: #2c2c4a;
        }
        
        h3 {
            font-size: 30px;
            margin-bottom: 40px;
            color: #1f1b2e;
            font-weight: 500;
            line-height: 1.4;
        }
        
        h4 {
            font-size: 40px;
            margin: 40px 0 30px;
            color: #2e2a4a;
        }
        
        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .btn {
            font-size: 35px;
            padding: 20px 30px;
            background-color: #e1d6c4;
            border-radius: 60px;
            color: #1d1729;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            flex: 1 1 250px;
            box-shadow: 0 5px 0 #b3a187;
        }
        
        .btn:hover {
            background-color: #262161;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 10px 0 #0b0a16;
            border-color: #cbb28b;
            cursor: pointer;
        }
        
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #0b0a16;
        }
    </style>
</head>

<body>
    <img src="./диппп.jpg" alt="Мем">
    
    <div class="content">
        <h1>Крутая личная страница</h1>
        <h2>Bogoavlenski Dmitri</h2>
        <h3>это мой первый проект по созданию сайта,<br>так-же я изучил питон и тг бота</h3>
        
        <h4>На страничках ты найдешь:</h4>
        
        <div class="buttons">
            <a href="./facts.html" class="btn">🔥 Факты обо мне</a>
            <a href="./memes.html" class="btn">🎭 Любимые мемы</a>
            <a href="./quotes.html" class="btn">📜 Любимые цитаты</a>
        </div>
    </div>
</body>
</html>
